---
name: Trading CI-Safe Tests

"on":
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

concurrency:
  group: trading-ci-safe-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trading-ci-safe-tests:
    name: Trading tests (no libtorch)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo registry and build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: trading-ci-safe-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            trading-ci-safe-${{ runner.os }}-${{ runner.arch }}-
            trading-ci-safe-${{ runner.os }}-

      - name: Run libtorch-free trading tests
        shell: bash
        run: scripts/test-trading-ci-safe.sh
