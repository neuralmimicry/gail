---
name: Trading CI-Safe Tests

"on":
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

concurrency:
  group: trading-ci-safe-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trading-ci-safe-tests:
    name: Trading tests (no libtorch) (${{ matrix.arch }})
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: '["self-hosted","Linux","X64"]'
          - arch: arm64
            runs_on: '["self-hosted","Linux","ARM64"]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            if command -v curl >/dev/null 2>&1; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain stable
            elif command -v wget >/dev/null 2>&1; then
              wget -qO- https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain stable
            else
              echo "::error::rustup is missing and neither curl nor wget is available to install it."
              exit 1
            fi
          fi
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          export PATH="${HOME}/.cargo/bin:${PATH}"
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo registry and build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: trading-ci-safe-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            trading-ci-safe-${{ runner.os }}-${{ runner.arch }}-
            trading-ci-safe-${{ runner.os }}-

      - name: Run libtorch-free trading tests
        shell: bash
        run: scripts/test-trading-ci-safe.sh
