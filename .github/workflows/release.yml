name: Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v. Defaults to Cargo.toml when omitted."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Resolve release version
    runs-on: [self-hosted, Linux, X64]
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      deb_version: ${{ steps.version.outputs.deb_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail

          version="${DISPATCH_VERSION:-}"
          if [[ -z "${version}" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "${version}" ]]; then
            cargo_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)"
            if [[ -z "${cargo_version}" ]]; then
              echo "Unable to resolve Cargo package version from Cargo.toml" >&2
              exit 2
            fi
            git fetch --tags --force origin >/dev/null 2>&1 || true
            latest_tag_version="$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n 1)"
            if [[ -n "${latest_tag_version}" ]]; then
              candidate="$(printf '%s\n%s\n' "${cargo_version}" "${latest_tag_version}" | sort -V | tail -n 1)"
            else
              candidate="${cargo_version}"
            fi
            version="${candidate}"
            if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
              if [[ ! "${version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                echo "Auto-bump requires stable SemVer MAJOR.MINOR.PATCH, got: ${version}" >&2
                exit 2
              fi
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              while true; do
                patch="$((patch + 1))"
                candidate="${major}.${minor}.${patch}"
                if ! git rev-parse -q --verify "refs/tags/v${candidate}" >/dev/null; then
                  version="${candidate}"
                  break
                fi
              done
            fi
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: ${version}" >&2
            exit 2
          fi

          deb_version="${version//-/~}"
          if [[ ! "${deb_version}" =~ ^[0-9][0-9A-Za-z.+~-]*$ ]]; then
            echo "Invalid Debian package version: ${deb_version}" >&2
            exit 2
          fi

          is_prerelease="false"
          if [[ "${version}" == *-* ]]; then
            is_prerelease="true"
          fi

          tag_name="v${version}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "${tag_name}" ]]; then
            echo "Tag-triggered release mismatch: ref=${GITHUB_REF_NAME}, derived=${tag_name}" >&2
            exit 2
          fi

          {
            echo "app_version=${version}"
            echo "deb_version=${deb_version}"
            echo "is_prerelease=${is_prerelease}"
            echo "tag_name=${tag_name}"
          } >> "${GITHUB_OUTPUT}"

          echo "Gail release version: ${version}"
          echo "Debian package version: ${deb_version}"
          echo "Release tag: ${tag_name}"

  build-deb:
    name: Build ${{ matrix.runner_arch }} Debian package
    needs: version
    runs-on: [self-hosted, Linux, "${{ matrix.runner_arch }}"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_arch: X64
            deb_arch: amd64
          - runner_arch: ARM64
            deb_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Ensure packaging tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v dpkg-deb >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends dpkg
          fi

      - name: Set release version
        run: bash scripts/set-release-version.sh "${{ needs.version.outputs.app_version }}"

      - name: Build release binary
        run: cargo build --locked --release -j 1

      - name: Verify release binary version
        shell: bash
        run: |
          set -euo pipefail
          binary_version="$(target/release/gail --version | sed -nE 's/^[^ ]+ ([^ ]+).*$/\1/p')"
          if [[ -z "${binary_version}" ]]; then
            echo "Unable to read release binary version" >&2
            exit 2
          fi
          if [[ "${binary_version}" != "${{ needs.version.outputs.app_version }}" ]]; then
            echo "Binary version mismatch: expected ${{ needs.version.outputs.app_version }}, got ${binary_version}" >&2
            exit 2
          fi

      - name: Build Debian package
        run: |
          bash scripts/build-deb.sh \
            --version "${{ needs.version.outputs.app_version }}" \
            --deb-version "${{ needs.version.outputs.deb_version }}" \
            --arch "${{ matrix.deb_arch }}" \
            --binary target/release/gail \
            --out-dir dist

      - name: Inspect Debian package
        run: dpkg-deb --info "dist/gail_${{ needs.version.outputs.deb_version }}_${{ matrix.deb_arch }}.deb"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: gail-deb-${{ matrix.deb_arch }}
          path: dist/*.deb
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    needs:
      - version
      - build-deb
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Download Debian packages
        uses: actions/download-artifact@v4
        with:
          pattern: gail-deb-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum *.deb > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: Gail v${{ needs.version.outputs.app_version }}
          generate_release_notes: true
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.version.outputs.is_prerelease != 'true' }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*.deb
            release-assets/SHA256SUMS
