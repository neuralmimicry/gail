---
name: Build, Version, and Release

"on":
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update the GitHub release for this ref."
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Optional tag to use when publishing. Defaults to v<build-version>."
        required: false
        type: string
      sign_update_bundle:
        description: "Attach signed GAIL.update artifacts when GAIL_UPDATE_KEY is configured."
        required: true
        type: boolean
        default: true
      container_libtorch_accelerator:
        description: "Container libtorch accelerator: cpu, cuda, cu118, cu121, cu124, cu126, cu128, auto, or no-gpu."
        required: true
        type: string
        default: "cpu"
      container_no_cache:
        description: "Build container images without Podman layer cache."
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

concurrency:
  group: build-version-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Version metadata
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      build_version: ${{ steps.version.outputs.build_version }}
      build_number: ${{ steps.version.outputs.build_number }}
      git_commit: ${{ steps.version.outputs.git_commit }}
      commit_short: ${{ steps.version.outputs.commit_short }}
      version_source: ${{ steps.version.outputs.version_source }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Derive GAIL version metadata
        id: version
        shell: bash
        run: bash scripts/derive-version.sh --github-output

  verify:
    name: Verify (${{ matrix.arch }})
    needs: version
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: '["self-hosted","Linux","X64"]'
          - arch: arm64
            runs_on: '["self-hosted","Linux","ARM64"]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            if command -v curl >/dev/null 2>&1; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain stable
            elif command -v wget >/dev/null 2>&1; then
              wget -qO- https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain stable
            else
              echo "::error::rustup is missing and neither curl nor wget is available to install it."
              exit 1
            fi
          fi
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          export PATH="${HOME}/.cargo/bin:${PATH}"
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Set up libtorch for host Cargo jobs
        shell: bash
        env:
          HOST_PYTORCH_VERSION: "2.11.0"
          HOST_LIBTORCH_ACCELERATOR: "cpu"
        run: |
          set -euo pipefail
          
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            libgomp1 \
            python3 \
            python3-pip \
            python3-venv
          
          python3 -m venv "${GITHUB_WORKSPACE}/.venv-libtorch"
          source "${GITHUB_WORKSPACE}/.venv-libtorch/bin/activate"
          python -m pip install --upgrade pip setuptools wheel packaging
          
          runner_arch="${RUNNER_ARCH:-$(uname -m)}"
          pytorch_version="${HOST_PYTORCH_VERSION}"
          accelerator="${HOST_LIBTORCH_ACCELERATOR:-cpu}"
          
          echo "Installing Python PyTorch ${pytorch_version} for torch-sys host build on ${runner_arch} (${accelerator})"
          case "${runner_arch}:${accelerator}" in
            X64:cpu|x64:cpu|amd64:cpu|x86_64:cpu)
              python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==${pytorch_version}"
              ;;
            X64:cu118|X64:cu121|X64:cu124|X64:cu126|X64:cu128|x86_64:cu118|x86_64:cu121|x86_64:cu124|x86_64:cu126|x86_64:cu128)
              python -m pip install --index-url "https://download.pytorch.org/whl/${accelerator}" "torch==${pytorch_version}"
              ;;
            *)
              # Linux ARM64/aarch64 PyTorch wheels are normally published via PyPI rather than the amd64 CPU index.
              python -m pip install "torch==${pytorch_version}"
              ;;
          esac

          torch_lib_dir="$(python - <<'PYTORCH'
          import pathlib
          import torch
          print(pathlib.Path(torch.__file__).resolve().parent / 'lib')
          PYTORCH
          )"

          cxx11_abi="$(python -c 'import torch; print(int(getattr(torch._C, "_GLIBCXX_USE_CXX11_ABI", True)))')"

          python - <<'PYTORCH'
          import pathlib
          import sys
          import torch
          print(f"Python: {sys.executable}")
          print(f"PyTorch: {torch.__version__}")
          print(f"PyTorch package: {pathlib.Path(torch.__file__).resolve()}")
          print(f"PyTorch CMake prefix: {torch.utils.cmake_prefix_path}")
          print(f"PyTorch CXX11 ABI: {int(getattr(torch._C, '_GLIBCXX_USE_CXX11_ABI', True))}")
          PYTORCH

          if [ ! -f "${torch_lib_dir}/libtorch.so" ] && [ ! -f "${torch_lib_dir}/libtorch_cpu.so" ]; then
            echo "::error::Python PyTorch installed, but libtorch shared libraries were not found under ${torch_lib_dir}"
            exit 2
          fi

          {
            echo "LIBTORCH_USE_PYTORCH=1"
            echo "LIBTORCH_CXX11_ABI=${cxx11_abi}"
            echo "CARGO_PROFILE_DEV_BUILD_OVERRIDE_DEBUG=true"
            echo "PATH=${GITHUB_WORKSPACE}/.venv-libtorch/bin:${PATH}"
            echo "LD_LIBRARY_PATH=${torch_lib_dir}:${LD_LIBRARY_PATH:-}"
          } >> "${GITHUB_ENV}"

          echo "Configured torch-sys to use Python PyTorch via LIBTORCH_USE_PYTORCH=1"

      - name: Cache cargo registry and build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: verify-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            verify-${{ runner.os }}-${{ runner.arch }}-
            verify-${{ runner.os }}-

      - name: Run canonical CI preflight
        env:
          GAIL_VERSION: ${{ needs.version.outputs.build_version }}
          GAIL_BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
          GAIL_GIT_COMMIT: ${{ github.sha }}
        run: bash scripts/preflight.sh --ci

      - name: Smoke test command surfaces
        env:
          GAIL_VERSION: ${{ needs.version.outputs.build_version }}
          GAIL_RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
          GAIL_BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
          GAIL_GIT_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          gail_version="$(cargo run --locked --bin gail -- --version)"
          if [[ "$gail_version" != "${GAIL_RELEASE_VERSION}" && "$gail_version" != "gail ${GAIL_RELEASE_VERSION}" ]]; then
            echo "::error::gail --version returned ${gail_version}; expected ${GAIL_RELEASE_VERSION} (or 'gail ${GAIL_RELEASE_VERSION}')"
            exit 1
          fi

      - name: Validate shell scripts
        run: >-
          bash -n
          scripts/release-common.sh
          scripts/preflight.sh
          scripts/derive-version.sh
          scripts/package-release.sh
          scripts/build-deb.sh
          scripts/set-release-version.sh
          scripts/test-trading-ci-safe.sh

  package:
    name: Package (${{ matrix.platform }})
    needs:
      - version
      - verify
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/heads/') &&
          github.ref_name == github.event.repository.default_branch
        )
      }}
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runs_on: '["self-hosted","Linux","X64"]'
            rust_target: x86_64-unknown-linux-gnu
            platform: linux-amd64
            archive_format: tar.gz
            binary_suffix: ""
            deb_arch: amd64
            can_execute: true
          - os: linux
            arch: arm64
            runs_on: '["self-hosted","Linux","ARM64"]'
            rust_target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            archive_format: tar.gz
            binary_suffix: ""
            deb_arch: arm64
            can_execute: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            if command -v curl >/dev/null 2>&1; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain stable
            elif command -v wget >/dev/null 2>&1; then
              wget -qO- https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain stable
            else
              echo "::error::rustup is missing and neither curl nor wget is available to install it."
              exit 1
            fi
          fi
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          export PATH="${HOME}/.cargo/bin:${PATH}"
          rustup toolchain install stable --profile minimal --target "${{ matrix.rust_target }}"
          rustup default stable

      - name: Set up libtorch for host Cargo jobs
        shell: bash
        env:
          HOST_PYTORCH_VERSION: "2.11.0"
          HOST_LIBTORCH_ACCELERATOR: "cpu"
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            libgomp1 \
            python3 \
            python3-pip \
            python3-venv

          python3 -m venv "${GITHUB_WORKSPACE}/.venv-libtorch"
          source "${GITHUB_WORKSPACE}/.venv-libtorch/bin/activate"
          python -m pip install --upgrade pip setuptools wheel packaging

          runner_arch="${RUNNER_ARCH:-$(uname -m)}"
          pytorch_version="${HOST_PYTORCH_VERSION}"
          accelerator="${HOST_LIBTORCH_ACCELERATOR:-cpu}"

          echo "Installing Python PyTorch ${pytorch_version} for torch-sys host build on ${runner_arch} (${accelerator})"

          case "${runner_arch}:${accelerator}" in
            X64:cpu|x64:cpu|amd64:cpu|x86_64:cpu)
              python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==${pytorch_version}"
              ;;
            X64:cu118|X64:cu121|X64:cu124|X64:cu126|X64:cu128|x86_64:cu118|x86_64:cu121|x86_64:cu124|x86_64:cu126|x86_64:cu128)
              python -m pip install --index-url "https://download.pytorch.org/whl/${accelerator}" "torch==${pytorch_version}"
              ;;
            *)
              python -m pip install "torch==${pytorch_version}"
              ;;
          esac

          torch_lib_dir="$(python - <<'PYTORCH'
          import pathlib
          import torch
          print(pathlib.Path(torch.__file__).resolve().parent / 'lib')
          PYTORCH
          )"

          cxx11_abi="$(python -c 'import torch; print(int(getattr(torch._C, "_GLIBCXX_USE_CXX11_ABI", True)))')"

          if [ ! -f "${torch_lib_dir}/libtorch.so" ] && [ ! -f "${torch_lib_dir}/libtorch_cpu.so" ]; then
            echo "::error::Python PyTorch installed, but libtorch shared libraries were not found under ${torch_lib_dir}"
            exit 2
          fi

          {
            echo "LIBTORCH_USE_PYTORCH=1"
            echo "LIBTORCH_CXX11_ABI=${cxx11_abi}"
            echo "CARGO_PROFILE_DEV_BUILD_OVERRIDE_DEBUG=true"
            echo "CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=true"
            echo "PATH=${GITHUB_WORKSPACE}/.venv-libtorch/bin:${PATH}"
            echo "LD_LIBRARY_PATH=${torch_lib_dir}:${LD_LIBRARY_PATH:-}"
          } >> "${GITHUB_ENV}"

          echo "Configured torch-sys to use Python PyTorch via LIBTORCH_USE_PYTORCH=1"

      - name: Configure iOS linker
        if: ${{ matrix.os == 'ios' }}
        run: |
          set -euo pipefail
          case "${{ matrix.rust_target }}" in
            aarch64-apple-ios)
              sdk=iphoneos
              min_flag=-miphoneos-version-min=13.0
              ;;
            x86_64-apple-ios)
              sdk=iphonesimulator
              min_flag=-mios-simulator-version-min=13.0
              ;;
            *)
              echo "::error::Unsupported iOS Rust target: ${{ matrix.rust_target }}"
              exit 1
              ;;
          esac

          sdk_path="$(xcrun --sdk "$sdk" --show-sdk-path)"
          clang_path="$(xcrun --sdk "$sdk" --find clang)"
          ar_path="$(xcrun --sdk "$sdk" --find ar)"
          target_env="$(printf '%s' "${{ matrix.rust_target }}" | tr '[:lower:]-' '[:upper:]_')"
          cc_env="$(printf '%s' "${{ matrix.rust_target }}" | tr '-' '_')"

          {
            echo "SDKROOT=$sdk_path"
            echo "CARGO_TARGET_${target_env}_LINKER=$clang_path"
            echo "CARGO_TARGET_${target_env}_RUSTFLAGS=-C link-arg=-isysroot -C link-arg=$sdk_path -C link-arg=$min_flag"
            echo "CC_${cc_env}=$clang_path"
            echo "AR_${cc_env}=$ar_path"
          } >> "$GITHUB_ENV"

      - name: Cache cargo registry and build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: package-${{ runner.os }}-${{ runner.arch }}-${{ matrix.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            package-${{ runner.os }}-${{ runner.arch }}-${{ matrix.platform }}-
            package-${{ runner.os }}-${{ runner.arch }}-
            package-${{ runner.os }}-

      - name: Build and package release artifacts
        env:
          GAIL_VERSION: ${{ needs.version.outputs.build_version }}
          GAIL_BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
          GAIL_GIT_COMMIT: ${{ github.sha }}
          GAIL_UPDATE_KEY: ${{ secrets.GAIL_UPDATE_KEY }}
          SIGN_UPDATE_BUNDLE: >-
            ${{ github.event_name != 'workflow_dispatch' || inputs.sign_update_bundle }}
          RELEASE_VERSION: ${{ needs.version.outputs.build_version }}
          RUST_TARGET: ${{ matrix.rust_target }}
          PLATFORM: ${{ matrix.platform }}
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
          BINARY_SUFFIX: ${{ matrix.binary_suffix }}
          DEB_ARCH: ${{ matrix.deb_arch }}
        run: |
          set -euo pipefail
          args=(
            --version "${RELEASE_VERSION}"
            --output-dir "./dist"
            --target-triple "${RUST_TARGET}"
            --platform "${PLATFORM}"
            --archive-format "${ARCHIVE_FORMAT}"
            --binary-suffix "${BINARY_SUFFIX}"
            --skip-preflight
          )

          [[ -n "${DEB_ARCH}" ]] && args+=(--deb-arch "${DEB_ARCH}")
          [[ "${SIGN_UPDATE_BUNDLE}" == "true" && -n "${GAIL_UPDATE_KEY:-}" ]] && args+=(--sign-update)

          bash scripts/package-release.sh "${args[@]}"

      - name: Validate Debian package metadata
        if: ${{ matrix.deb_arch != '' }}
        env:
          DEB_ARCH: ${{ matrix.deb_arch }}
        run: |
          set -euo pipefail
          deb_path="$(find dist -maxdepth 1 -type f -name 'gail_*.deb' | head -n 1)"
          if [[ -z "$deb_path" ]]; then
            echo "::error::Expected a Debian package under dist/"
            exit 1
          fi

          expected_version="$(basename "$deb_path" | sed -E 's/^gail_(.*)_[^_]+\.deb$/\1/')"
          actual_package="$(dpkg-deb -f "$deb_path" Package)"
          actual_version="$(dpkg-deb -f "$deb_path" Version)"
          actual_arch="$(dpkg-deb -f "$deb_path" Architecture)"

          [[ "$actual_package" == "gail" ]]
          [[ "$actual_version" == "$expected_version" ]]
          [[ "$actual_arch" == "$DEB_ARCH" ]]

          tar_listing="$(mktemp)"
          trap 'rm -f "$tar_listing"' EXIT
          dpkg-deb --fsys-tarfile "$deb_path" | tar -tf - > "$tar_listing"
          grep -qx './usr/bin/gail-qlora-sft' "$tar_listing"

      - name: Smoke test packaged binaries
        if: ${{ matrix.can_execute }}
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          BINARY_SUFFIX: ${{ matrix.binary_suffix }}
        run: |
          set -euo pipefail
          bin_dir="./target/${RUST_TARGET}/release"
          "${bin_dir}/gail${BINARY_SUFFIX}" --version
          test -x "${bin_dir}/gail-qlora-sft${BINARY_SUFFIX}"

          archive_path="$(find dist -maxdepth 1 -type f -name 'gail-*.tar.gz' | head -n 1)"
          [[ -n "$archive_path" ]]
          tar_listing="$(mktemp)"
          trap 'rm -f "$tar_listing"' EXIT
          tar -tzf "$archive_path" > "$tar_listing"
          grep -Eq '/gail-qlora-sft$' "$tar_listing"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gail-${{ needs.version.outputs.build_version }}-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  create-version-tag:
    name: Create version tag
    needs:
      - version
      - verify
      - package
    if: >-
      ${{
        (
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/heads/') &&
          github.ref_name == github.event.repository.default_branch
        ) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create immutable tag for this commit
        id: tag
        shell: bash
        env:
          DEFAULT_TAG: ${{ needs.version.outputs.tag }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
          BUILD_VERSION: ${{ needs.version.outputs.build_version }}
        run: |
          set -euo pipefail
          tag="${REQUESTED_TAG:-$DEFAULT_TAG}"

          git check-ref-format "refs/tags/${tag}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --force --tags origin

          if git show-ref --tags --verify --quiet "refs/tags/${tag}"; then
            existing_commit="$(git rev-list -n 1 "${tag}")"
            if [[ "${existing_commit}" != "${GITHUB_SHA}" ]]; then
              echo "::error::Tag ${tag} already points to ${existing_commit}, not ${GITHUB_SHA}"
              exit 1
            fi
            echo "Tag ${tag} already exists for ${GITHUB_SHA}"
          else
            git tag -a "${tag}" "${GITHUB_SHA}" -m "GAIL ${BUILD_VERSION} (${GITHUB_SHA})"
            git push origin "refs/tags/${tag}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  publish-release:
    name: Publish GitHub release
    needs:
      - version
      - create-version-tag
      - package
    if: >-
      ${{
        (
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/heads/') &&
          github.ref_name == github.event.repository.default_branch
        ) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./dist
          pattern: gail-${{ needs.version.outputs.build_version }}-*
          merge-multiple: true

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create-version-tag.outputs.tag }}
          BUILD_VERSION: ${{ needs.version.outputs.build_version }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
          COMMIT_SHORT: ${{ needs.version.outputs.commit_short }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find dist -type f -print0 | sort -z)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No packaged artifacts were downloaded"
            exit 1
          fi

          notes="$(mktemp)"
          cat >"$notes" <<NOTES
          Automated GAIL release for ${GITHUB_SHA}.

          Build version: ${BUILD_VERSION}
          Cargo package version: ${RELEASE_VERSION}
          Commit: ${COMMIT_SHORT}
          Workflow run: ${GITHUB_RUN_ID}
          NOTES

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
            gh release edit "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "GAIL ${BUILD_VERSION}" \
              --notes-file "$notes"
          else
            gh release create "${RELEASE_TAG}" "${files[@]}" \
              --target "${GITHUB_SHA}" \
              --title "GAIL ${BUILD_VERSION}" \
              --notes-file "$notes"
          fi

  build-container-arch:
    name: Build container (${{ matrix.arch }})
    needs:
      - version
      - create-version-tag
      - publish-release
    if: >-
      ${{
        (
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/heads/') &&
          github.ref_name == github.event.repository.default_branch
        ) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      }}
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runs_on: '["self-hosted","Linux","X64"]'
            pytorch_jobs_default: auto
          - arch: arm64
            platform: linux/arm64
            runs_on: '["self-hosted","Linux","ARM64"]'
            pytorch_jobs_default: "2"
    env:
      BUILD_VERSION: ${{ needs.version.outputs.build_version }}
      RELEASE_TAG: ${{ needs.create-version-tag.outputs.tag }}
      COMMIT_SHORT: ${{ needs.version.outputs.commit_short }}
      # Prefer the explicitly managed GHCR credential because this
      # organisation-owned package currently rejects the repository's
      # ephemeral GITHUB_TOKEN even with `packages: write`. Keep the scoped
      # job token as a fallback for repositories whose package permissions
      # allow it.
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare image metadata
        id: image
        run: |
          set -euo pipefail
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "repo=${image_repo}" >> "${GITHUB_OUTPUT}"
          echo "arch_tag=${image_repo}:${BUILD_VERSION}-${{ matrix.arch }}" >> "${GITHUB_OUTPUT}"
          echo "created=${created}" >> "${GITHUB_OUTPUT}"

      - name: Validate container tooling
        shell: bash
        run: |
          set -euo pipefail
          
          if ! command -v podman >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y podman skopeo jq
            else
              echo "::error::Podman is required on the self-hosted runner. Install podman, skopeo and jq, or allow this job to use sudo apt-get."
              exit 1
            fi
          fi
          
          podman --version
          
          host_arch="$(podman info --format '{{.Host.Arch}}' 2>/dev/null || uname -m)"
          host_os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          
          echo "Podman host: ${host_arch} ${host_os}"

      - name: Log in to GHCR
        run: |
          set -euo pipefail
          username="${GHCR_USERNAME:-${GITHUB_ACTOR}}"
          password="${GHCR_TOKEN:-${GITHUB_TOKEN}}"
          test -n "${username}" || { echo "::error::No GHCR username available"; exit 1; }
          test -n "${password}" || { echo "::error::No GHCR token available"; exit 1; }
          printf '%s' "${password}" | podman login ghcr.io --username "${username}" --password-stdin

      - name: Build and push architecture image with Podman
        env:
          IMAGE_REPO: ${{ steps.image.outputs.repo }}
          ARCH_TAG: ${{ steps.image.outputs.arch_tag }}
          IMAGE_CREATED: ${{ steps.image.outputs.created }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_PYTORCH_JOBS_DEFAULT: ${{ matrix.pytorch_jobs_default }}
          INPUT_LIBTORCH_ACCELERATOR: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.container_libtorch_accelerator || 'cpu' }}
          INPUT_CONTAINER_NO_CACHE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.container_no_cache || false }}
        run: |
          set -euo pipefail

          host_jobs="$(nproc)"
          build_jobs="${BUILD_JOBS:-${host_jobs}}"
          cargo_jobs="${CARGO_BUILD_JOBS:-${build_jobs}}"
          libtorch_version="${LIBTORCH_VERSION:-2.11.0}"
          libtorch_build_from_source="${LIBTORCH_BUILD_FROM_SOURCE:-auto}"
          libtorch_amd64_build_from_source="${LIBTORCH_AMD64_BUILD_FROM_SOURCE:-false}"
          libtorch_arm64_build_from_source="${LIBTORCH_ARM64_BUILD_FROM_SOURCE:-auto}"
          libtorch_url="${LIBTORCH_URL:-}"
          libtorch_arm64_xnnpack="${LIBTORCH_ARM64_XNNPACK:-auto}"
          libtorch_arm64_kleidiai="${LIBTORCH_ARM64_KLEIDIAI:-false}"
          pytorch_git_tag="${PYTORCH_GIT_TAG:-auto}"
          provided_libtorch_seed_image="${LIBTORCH_SEED_IMAGE:-}"

          if [[ "${MATRIX_PYTORCH_JOBS_DEFAULT}" == "auto" ]]; then
            pytorch_jobs="${PYTORCH_BUILD_PARALLEL_LEVEL:-${build_jobs}}"
          else
            pytorch_jobs="${PYTORCH_BUILD_PARALLEL_LEVEL:-${MATRIX_PYTORCH_JOBS_DEFAULT}}"
          fi

          no_cache_flag=()
          if [[ "${INPUT_CONTAINER_NO_CACHE}" == "true" ]]; then
            no_cache_flag+=(--no-cache)
          fi

          if [[ "${MATRIX_ARCH}" == "arm64" ]]; then
            echo "ARM64 CPU features:"
            grep -m1 -E '^Features[[:space:]]*:' /proc/cpuinfo || true
        
            if grep -m1 -E '^Features[[:space:]]*:.*(^|[[:space:]])sve([[:space:]]|$)' /proc/cpuinfo >/dev/null 2>&1; then
              echo "ARM64 SVE: present, but disabled for release container builds unless explicitly enabled"
            else
              echo "ARM64 SVE: absent"
            fi
            
            arm64_sve="${LIBTORCH_ARM64_SVE:-false}"
          else
            arm64_sve="false"
          fi

          registry_user="${GHCR_USERNAME:-${GITHUB_ACTOR}}"
          registry_token="${GHCR_TOKEN:-${GITHUB_TOKEN}}"
          libtorch_seed_image="${provided_libtorch_seed_image}"

          if [[ -z "${libtorch_seed_image}" ]]; then
            libtorch_key_seed="arch=${MATRIX_ARCH};version=${libtorch_version};accel=${INPUT_LIBTORCH_ACCELERATOR};url=${libtorch_url};build_from_source=${libtorch_build_from_source};amd64_from_source=${libtorch_amd64_build_from_source};arm64_from_source=${libtorch_arm64_build_from_source};arm64_sve=${arm64_sve};arm64_xnnpack=${libtorch_arm64_xnnpack};arm64_kleidiai=${libtorch_arm64_kleidiai};pytorch_tag=${pytorch_git_tag}"
            libtorch_cache_hash="$(printf '%s' "${libtorch_key_seed}" | sha256sum | cut -c1-24)"
            libtorch_version_tag="$(printf '%s' "${libtorch_version}" | tr -c '[:alnum:]._-' '-')"
            libtorch_cache_tag="libtorch-${MATRIX_ARCH}-${libtorch_version_tag}-${libtorch_cache_hash}"
            libtorch_seed_image="${IMAGE_REPO}:${libtorch_cache_tag}"

            if skopeo inspect --creds "${registry_user}:${registry_token}" "docker://${libtorch_seed_image}" >/dev/null 2>&1; then
              echo "Reusing existing libtorch seed image ${libtorch_seed_image}"
            else
              echo "Building libtorch seed image ${libtorch_seed_image}"
              seed_iid_file="$(mktemp)"
              podman build \
                --platform "${MATRIX_PLATFORM}" \
                --network=host \
                --pull \
                --layers \
                --build-arg LIBTORCH_VERSION="${libtorch_version}" \
                --build-arg LIBTORCH_ACCELERATOR="${INPUT_LIBTORCH_ACCELERATOR}" \
                --build-arg LIBTORCH_URL="${libtorch_url}" \
                --build-arg LIBTORCH_BUILD_FROM_SOURCE="${libtorch_build_from_source}" \
                --build-arg LIBTORCH_AMD64_BUILD_FROM_SOURCE="${libtorch_amd64_build_from_source}" \
                --build-arg LIBTORCH_ARM64_BUILD_FROM_SOURCE="${libtorch_arm64_build_from_source}" \
                --build-arg PYTORCH_GIT_TAG="${pytorch_git_tag}" \
                --build-arg BUILD_JOBS="${build_jobs}" \
                --build-arg CMAKE_BUILD_PARALLEL_LEVEL="${build_jobs}" \
                --build-arg PYTORCH_BUILD_PARALLEL_LEVEL="${pytorch_jobs}" \
                --build-arg LIBTORCH_ARM64_SVE="${arm64_sve}" \
                --build-arg LIBTORCH_ARM64_XNNPACK="${libtorch_arm64_xnnpack}" \
                --build-arg LIBTORCH_ARM64_KLEIDIAI="${libtorch_arm64_kleidiai}" \
                --target libtorch-export \
                --iidfile "${seed_iid_file}" \
                -f Containerfile \
                -t "${libtorch_seed_image}" \
                .
              seed_image_id="$(tr -d '\n' < "${seed_iid_file}")"
              rm -f "${seed_iid_file}"
              if [[ -z "${seed_image_id}" ]]; then
                echo "::error::Podman did not emit an image ID for ${libtorch_seed_image}"
                exit 1
              fi
              podman push "${seed_image_id}" "docker://${libtorch_seed_image}"
            fi
          else
            echo "Using caller-provided libtorch seed image ${libtorch_seed_image}"
          fi

          echo "Building ${ARCH_TAG} on ${MATRIX_PLATFORM} with BUILD_JOBS=${build_jobs}, CARGO_BUILD_JOBS=${cargo_jobs}, PYTORCH_BUILD_PARALLEL_LEVEL=${pytorch_jobs}, LIBTORCH_ACCELERATOR=${INPUT_LIBTORCH_ACCELERATOR}, LIBTORCH_SEED_IMAGE=${libtorch_seed_image}"

          arch_iid_file="$(mktemp)"
          podman build \
            --platform "${MATRIX_PLATFORM}" \
            --network=host \
            --pull \
            --layers \
            "${no_cache_flag[@]}" \
            --build-arg GAIL_VERSION=source \
            --build-arg BUILD_VERSION="${BUILD_VERSION}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            --build-arg IMAGE_CREATED="${IMAGE_CREATED}" \
            --build-arg LIBTORCH_SEED_IMAGE="${libtorch_seed_image}" \
            --build-arg LIBTORCH_VERSION="${libtorch_version}" \
            --build-arg LIBTORCH_ACCELERATOR="${INPUT_LIBTORCH_ACCELERATOR}" \
            --build-arg LIBTORCH_URL="${libtorch_url}" \
            --build-arg LIBTORCH_BUILD_FROM_SOURCE="${libtorch_build_from_source}" \
            --build-arg LIBTORCH_AMD64_BUILD_FROM_SOURCE="${libtorch_amd64_build_from_source}" \
            --build-arg LIBTORCH_ARM64_BUILD_FROM_SOURCE="${libtorch_arm64_build_from_source}" \
            --build-arg PYTORCH_GIT_TAG="${pytorch_git_tag}" \
            --build-arg BUILD_JOBS="${build_jobs}" \
            --build-arg CARGO_BUILD_JOBS="${cargo_jobs}" \
            --build-arg CMAKE_BUILD_PARALLEL_LEVEL="${build_jobs}" \
            --build-arg PYTORCH_BUILD_PARALLEL_LEVEL="${pytorch_jobs}" \
            --build-arg LIBTORCH_ARM64_SVE="${arm64_sve}" \
            --build-arg LIBTORCH_ARM64_XNNPACK="${libtorch_arm64_xnnpack}" \
            --build-arg LIBTORCH_ARM64_KLEIDIAI="${libtorch_arm64_kleidiai}" \
            --iidfile "${arch_iid_file}" \
            -f Containerfile \
            -t "${ARCH_TAG}" \
            .

          arch_image_id="$(tr -d '\n' < "${arch_iid_file}")"
          rm -f "${arch_iid_file}"
          if [[ -z "${arch_image_id}" ]]; then
            echo "::error::Podman did not emit an image ID for ${ARCH_TAG}"
            exit 1
          fi
          podman push "${arch_image_id}" "docker://${ARCH_TAG}"

  publish-container:
    name: Publish multi-arch container manifest
    needs:
      - version
      - create-version-tag
      - build-container-arch
    if: >-
      ${{
        (
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/heads/') &&
          github.ref_name == github.event.repository.default_branch
        ) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      }}
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      packages: write
    env:
      BUILD_VERSION: ${{ needs.version.outputs.build_version }}
      RELEASE_TAG: ${{ needs.create-version-tag.outputs.tag }}
      COMMIT_SHORT: ${{ needs.version.outputs.commit_short }}
      # Use the same managed-package credential and scoped fallback as the
      # architecture builders so manifest publication has identical access.
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
    steps:
      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "repo=${image_repo}" >> "${GITHUB_OUTPUT}"

      - name: Ensure Podman is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v podman >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y podman skopeo jq
            else
              echo "::error::Podman is required on the self-hosted runner. Install podman, skopeo and jq, or allow this job to use sudo apt-get."
              exit 1
            fi
          fi
          podman --version

      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail
          username="${GHCR_USERNAME:-${GITHUB_ACTOR}}"
          password="${GHCR_TOKEN:-${GITHUB_TOKEN}}"
          test -n "${username}" || { echo "::error::No GHCR username available"; exit 1; }
          test -n "${password}" || { echo "::error::No GHCR token available"; exit 1; }
          printf '%s' "${password}" | podman login ghcr.io --username "${username}" --password-stdin

      - name: Create and push multi-arch manifest
        shell: bash
        env:
          IMAGE_REPO: ${{ steps.image.outputs.repo }}
        run: |
          set -euo pipefail
          manifest_local="gail-manifest-${BUILD_VERSION}"
          amd64_ref="docker://${IMAGE_REPO}:${BUILD_VERSION}-amd64"
          arm64_ref="docker://${IMAGE_REPO}:${BUILD_VERSION}-arm64"

          podman manifest rm "${manifest_local}" >/dev/null 2>&1 || true
          podman manifest create "${manifest_local}"
          podman manifest add "${manifest_local}" "${amd64_ref}"
          podman manifest add "${manifest_local}" "${arm64_ref}"

          tags=(
            "latest"
            "local-dev-current"
            "${RELEASE_TAG}"
            "${BUILD_VERSION}"
            "${COMMIT_SHORT}"
          )

          for tag in "${tags[@]}"; do
            echo "Pushing ${IMAGE_REPO}:${tag}"
            podman manifest push --all "${manifest_local}" "docker://${IMAGE_REPO}:${tag}"
          done
