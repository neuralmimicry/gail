## Runtime roles

Gail supports three runtime roles via `--role` or `GAIL_ROLE`:

| Role | Command | Purpose |
|---|---|---|
| `serve` (default) | `cargo run -- --config gail.yaml --role serve` | Axum HTTP server: LLM routing, trading bridge, status APIs |
| `mirror-worker` | `cargo run -- --config gail.yaml --role mirror-worker` | Polls Postgres; mirrors LLM interactions to AARNN |
| `trainer-worker` | `cargo run -- --config gail.yaml --role trainer-worker` | Runs QLoRA/LoRA fine-tuning on accumulated interactions |

## Quick start

```bash
# Build (no libtorch — CI-safe)
cargo build --no-default-features

# Run tests (CI-safe)
cargo test --no-default-features --features ci-trading-tests

# Run the serve role
cargo run -- --config gail.yaml --role serve
```

## Request flow

```
HTTP request
  → src/app.rs          (axum router, auth via GailService::authorize)
  → src/orchestration.rs (GailService: multi-provider fan-out, workload pools)
  → src/providers/       (OpenAI / Gemini / Ollama adapters)
```

The model field on `/v1/chat/completions` controls routing:
- `gail-auto` → orchestrated best-of-N
- `provider/model` (e.g. `openai/gpt-4o`) → direct route
- bare model name → inferred from prefix

## Key endpoints

| Endpoint | Purpose |
|---|---|
| `GET /healthz` | Health check |
| `POST /v1/llm/complete` | Workflow-aware multi-provider orchestration |
| `POST /v1/chat/completions` | OpenAI-compatible completion |
| `GET /v1/status/orchestration` | Provider health and metrics snapshot |
| `GET /v1/trading/status` | Trading bridge status |
| `GET /metrics` | Prometheus metrics |

