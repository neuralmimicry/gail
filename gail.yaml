server:
  bind_addr: "0.0.0.0:8080"
  public_base_url: "${GAIL_PUBLIC_BASE_URL}"

security:
  allow_unauthenticated_health: true
  allow_unauthenticated_metrics: true
  api_tokens:
    - client_id: "refiner"
      token: "${GAIL_REFINER_API_TOKEN}"
      scopes: ["llm", "neuromorphic", "aer", "status", "health"]
    - client_id: "tracey"
      token: "${GAIL_TRACEY_API_TOKEN}"
      scopes: ["llm", "neuromorphic", "aer", "status", "health"]
    - client_id: "continuum"
      token: "${GAIL_CONTINUUM_API_TOKEN}"
      scopes: ["llm", "neuromorphic", "aer", "status", "health", "trading"]
    - client_id: "pbisaacs"
      token: "${GAIL_ADMIN_API_TOKEN}"
      scopes: ["llm", "neuromorphic", "aer", "status", "health", "trading"]

orchestration:
  enabled: true
  selection_mode: best
  max_parallel_candidates: 3
  interactive_pool_max_in_flight: 8
  solver_pool_max_in_flight: 4
  workload_pool_wait_timeout_ms: 250
  include_configured_candidates: true
  health_ttl_seconds: 1800
  early_success_enabled: true
  early_success_settle_seconds: 0.75
  early_success_min_quality: 0.5
  candidate_timeout_cap_seconds: 45
  interactive_model_floor_b: 0.5
  solver_model_floor_b: 1.5
  strict_no_downgrade: true
  always_route_specialists: false

providers:
  - name: "OpenAIPrimary"
    provider: openai
    model: "${GAIL_OPENAI_MODEL}"
    api_key: "${OPENAI_API_KEY}"
    roles: ["planner", "reviewer", "assistant"]
    specialties: ["planning", "json", "review", "code"]
    preferred: true
    weight: 0.3
    source: "example"
  - name: "GeminiResearch"
    provider: gemini
    model: "${GAIL_GEMINI_MODEL}"
    api_key: "${GEMINI_API_KEY}"
    access_token: "${GOOGLE_ACCESS_TOKEN}"
    roles: ["researcher", "assistant"]
    specialties: ["research", "citations", "long_context"]
    weight: 0.25
    source: "example"
  - name: "NVIDIAKimiResearch"
    provider: nvidia
    model: "${GAIL_NVIDIA_KIMI_MODEL}"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "${GAIL_NVIDIA_BASE_URL}"
    roles: ["researcher", "assistant"]
    specialties: ["research", "long_context", "reasoning", "code"]
    weight: 0.22
    source: "example"
  - name: "NVIDIAMiniMaxPlanner"
    provider: nvidia
    model: "${GAIL_NVIDIA_MINIMAX_MODEL}"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "${GAIL_NVIDIA_BASE_URL}"
    roles: ["planner", "assistant"]
    specialties: ["planning", "reasoning", "agentic", "code"]
    weight: 0.2
    source: "example"
  - name: "NVIDIADeepSeekReasoner"
    provider: nvidia
    model: "${GAIL_NVIDIA_DEEPSEEK_MODEL}"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "${GAIL_NVIDIA_BASE_URL}"
    roles: ["planner", "reviewer", "assistant"]
    specialties: ["reasoning", "analysis", "review", "code"]
    weight: 0.18
    source: "example"
  - name: "NVIDIAGLMGeneralist"
    provider: nvidia
    model: "${GAIL_NVIDIA_GLM_MODEL}"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "${GAIL_NVIDIA_BASE_URL}"
    roles: ["reviewer", "assistant"]
    specialties: ["summary", "reasoning", "long_context", "analysis"]
    weight: 0.16
    source: "example"
  - name: "OllamaLocal"
    provider: ollama
    model: "${GAIL_OLLAMA_MODEL}"
    base_url: "${GAIL_OLLAMA_BASE_URL}"
    roles: ["general", "planner", "reviewer", "researcher", "assistant"]
    specialties: ["local", "privacy", "code", "planning", "json", "review", "research"]
    weight: 0.15
    priority_bias: 0.05
    usage_penalty_decay_seconds: 600
    # Set the same host_group across multiple Ollama instances that share a physical host.
    host_group: "ollama-host-a"
    max_concurrent_requests: 2
    resource_cost_cpu: 2.0
    resource_cost_ram_mb: 8192
    resource_cost_vram_mb: 8192
    host_cpu_budget: 16.0
    host_ram_budget_mb: 65536
    host_vram_budget_mb: 24576
    nmc_agent_id: "tracey-ollama-host-a"
    nmc_host: "ollama-host-a"
    source: "example"

specialists:
  - name: "AARNN"
    type: aarnn
    endpoint: "${GAIL_AARNN_ENDPOINT}"
    socket_path: "${GAIL_AARNN_SOCKET_PATH}"
    repo_root: "${GAIL_AARNN_REPO_ROOT}"
    allow_offline_heuristic: true
    sensory_size: 32
    output_size: 16
    aer_sensory_base: 4096
    aer_output_base: 16384
    timeout_seconds: 2.0
    health_ttl_seconds: 300
    spike_threshold: 0.5
    roles: ["planner", "reviewer", "researcher", "assistant"]
    specialties: ["aarnn", "snn", "neuromorphic", "aer"]
    keyword_hints: ["aarnn", "aer", "snn", "spiking", "neuromorphic"]
    guidance_lines:
      - "Prefer AARNN-grown SNN designs when the task explicitly calls for spiking or neuromorphic networks."
      - "Use AER1 payloads for spike exchange with the attached runtime."
    weight: 0.2
    prefer_aarnn_designs: true

aarnn_bridge:
  enabled: true
  endpoint: "${GAIL_AARNN_BRIDGE_ENDPOINT}"
  access_token: "${GAIL_AARNN_BRIDGE_ACCESS_TOKEN}"
  timeout_seconds: 4.0
  queue_capacity: 256
  worker_count: 2
  enqueue_timeout_ms: 35
  candidate_wait_timeout_ms: 300
  mirror_input: true
  mirror_output: true
  request_candidate_reply: true
  response_preference: llm_preferred
  candidate_confidence_threshold: 0.98
  candidate_min_reply_chars: 24
  network_id: "${GAIL_AARNN_BRIDGE_NETWORK_ID}"
  node_id: "${GAIL_AARNN_BRIDGE_NODE_ID}"
  max_text_chars: 8192

nmc_telemetry:
  enabled: false
  base_url: "${GAIL_NMC_BASE_URL}"
  access_token: "${GAIL_NMC_API_TOKEN}"
  timeout_seconds: 2.0
  cache_ttl_seconds: 5.0
  stale_after_seconds: 300
  adaptive_policy: "balanced"

storage:
  metrics_path: "./data/provider_metrics.json"
  adaptive_schema_path: "./data/adaptive_api_schema.json"
  api_issues_path: "./data/api_issues.json"
  llm_ledger_path: "./data/llm_interactions.jsonl"
  trainer_output_path: "./data/training"
  postgres_dsn: "${GAIL_POSTGRES_DSN}"
  ollama_model_store_path: "./data/ollama_model_inventory.json"

llm_ledger:
  enabled: true
  queue_capacity: 4096
  enqueue_timeout_ms: 25
  max_prompt_chars: 65536
  max_response_chars: 65536

mirror_worker:
  enabled: true
  poll_interval_ms: 2000
  batch_size: 64
  max_attempts: 6
  retry_backoff_seconds: 60

trainer:
  enabled: false
  poll_interval_seconds: 300
  min_samples: 128
  max_samples_per_snapshot: 1024
  include_degraded: false
  max_attempts: 6
  retry_backoff_seconds: 300
  algorithm: "qlora_sft"
  command_template: ""
  command_timeout_seconds: 86400
  model_prefix: "gail-inhouse"
  model_alias: "gail-inhouse:latest"
  ollama_base_model: "${GAIL_OLLAMA_MODEL}"
  rotate_keep: 6
  register_with_ollama: true
  ollama_cli: "ollama"
  ollama_host: "${OLLAMA_HOST}"
  output_root: "./data/training"

trading:
  enabled: ${GAIL_TRADING_ENABLED}
  octobot_base_url: "${GAIL_TRADING_OCTOBOT_URL}"
  octobot_password: "${GAIL_TRADING_OCTOBOT_PASSWORD}"
  refiner_base_url: "${GAIL_TRADING_REFINER_URL}"
  refiner_api_token: "${GAIL_TRADING_REFINER_TOKEN}"
  admin_client_ids: ["pbisaacs"]
  evaluation_interval_seconds: ${GAIL_TRADING_EVAL_INTERVAL}
  max_parallel_advisors: 5
  micro_trade_max_usd: ${GAIL_TRADING_MAX_USD}
  micro_trade_min_usd: ${GAIL_TRADING_MIN_USD}
  max_open_positions: ${GAIL_TRADING_MAX_POSITIONS}
  min_trade_interval_seconds: 120
  target_exchanges: []
  target_currencies: []
  fuzzy_confidence_threshold: ${GAIL_TRADING_CONFIDENCE_THRESHOLD}
  research_query_template: "cryptocurrency market sentiment {currency} {exchange} {date}"
  research_index_name: "crypto"
  research_site_hints: ["bloomberg.com", "reuters.com", "cnbc.com"]
  research_max_parallel_queries: 3
  research_top_k: 5
  log_ring_size: 1000
  trade_ring_size: 200
  data_path: "./data/trading_state.json"
  fuzzy_weight: 0.4
  live_execution_enabled: true
  octobot_timeout_seconds: 10.0
  refiner_timeout_seconds: 15.0
  advisor_timeout_seconds: 30.0
  backtesting_enabled: false
  backtest_data_catalog_path: "./data/backtest_data_catalog.json"
  backtest_data_collection_enabled: true
  backtest_data_collection_exchange: "binance"
  backtest_data_collection_time_frames: ["1h", "1d"]
  backtest_data_collection_cooldown_seconds: 3600
